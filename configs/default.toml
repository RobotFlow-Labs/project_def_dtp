[project]
name = "anima-def-dtp"
codename = "DEF-DTP"
functional_name = "DEF-dtp"
wave = 7
paper_arxiv = "2603.26462"
paper_title = "DTP-Attack: A decision-based black-box adversarial attack on trajectory prediction"

[compute]
backend = "auto"  # "mlx", "cuda", "auto"
precision = "fp32"
torch_device = "auto"

[data]
shared_volume = "/Volumes/AIFlowDev/RobotFlowLabs/datasets"
repos_volume = "/Volumes/AIFlowDev/RobotFlowLabs/repos/wave7"
project_data_root = "artifacts"

[attack]
max_iter = 1000
orthogonal_step = 1.0
forward_step = 0.1
orthogonal_decay = 0.95
forward_decay = 0.9
tolerance = 1e-6

[thresholds.nuscenes]
obs_length = 4
pred_length = 12
ade = 7.5
fde = 17.5
lateral = 2.0
longitudinal = 3.0

[thresholds.apolloscape]
obs_length = 6
pred_length = 6
ade = 3.5
fde = 7.5
lateral = 2.0
longitudinal = 3.0

[runtime]
pretrained_root_linux = "/mnt/forge-data/models/def_dtp"
dataset_root_linux = "/mnt/forge-data/datasets/def_dtp"
pretrained_root_mac = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/models/def_dtp"
dataset_root_mac = "/Volumes/AIFlowDev/RobotFlowLabs/datasets/datasets/def_dtp"

[hardware]
zed2i = true
unitree_l2_lidar = true
cobot_xarm6 = false  # Set true when purchased
